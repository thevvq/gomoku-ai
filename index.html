<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gomoku AI — Light Green Theme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&subset=vietnamese&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

  <!-- App Wrapper -->
  <div id="app" class="app">
    
    <!-- Topbar -->
    <header class="header">
      <div class="header-left">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">GOMOKU</span>
          <span class="logo-subtitle">AI ARENA</span>
        </div>
      </div>
      
      <div class="header-center">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span id="statusText">Sẵn sàng</span>
        </div>
      </div>
      
      <div class="header-right">
        <button class="settings-btn" id="btnSettings" title="Cài đặt">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Layout: 3 Columns -->
    <main class="main-layout">
      
      <!-- Sidebar Left -->
      <aside class="sidebar-left">
        <!-- Player X Card -->
        <div class="player-card active" id="playerXCard">
          <div class="player-avatar x-avatar"></div>
          <div class="player-info">
            <div class="player-name" id="playerXName">Người chơi 1</div>
            <div class="player-role">Quân X</div>
          </div>
          <div class="player-active-dot" id="playerXBadge"></div>
        </div>
        
        <!-- Player O Card -->
        <div class="player-card" id="playerOCard">
          <div class="player-avatar o-avatar"></div>
          <div class="player-info">
            <div class="player-name" id="playerOName">Người chơi 2</div>
            <div class="player-role">Quân O</div>
          </div>
          <div class="player-active-dot" id="playerOBadge"></div>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
          <button class="btn btn-primary" id="btnNewGame">
            Chơi mới
          </button>
          <button class="btn btn-secondary" id="btnReplay">
            Chơi lại
          </button>
          <button class="btn btn-outline" id="btnSettingsAlt">
            Cài đặt
          </button>
        </div>

        <div class="difficulty-group">
          <div class="diff-label">ĐỘ KHÓ AI</div>
          <div class="diff-buttons">
            <button class="diff-btn" id="diffEasy" data-diff="easy">Dễ</button>
            <button class="diff-btn active" id="diffMedium" data-diff="medium">Vừa</button>
            <button class="diff-btn" id="diffHard" data-diff="hard">Khó</button>
          </div>
        </div>
      </aside>

      <!-- Board Section -->
      <section class="board-section">
        <div class="board-card">
          <div id="boardGrid" class="board-grid"></div>
        </div>
      </section>

      <!-- Sidebar Right -->
      <aside class="sidebar-right">
        <!-- Scoreboard Panel -->
        <div class="panel scoreboard-panel">
          <div class="panel-title">BẢNG ĐIỂM</div>
          <div class="scores">
            <div class="score-player">
              <span class="score-val player-val" id="scoreXValue">0</span>
            </div>
            <div class="score-vs">VS</div>
            <div class="score-ai">
              <span class="score-val ai-val" id="scoreOValue">0</span>
            </div>
          </div>
          <div class="score-row draws-row">
            <span>Hòa</span>
            <span id="drawValue">0</span>
          </div>
          <div class="score-row total-row">
            <span>Tổng điểm</span>
            <span id="totalGames">0</span>
          </div>
        </div>

        <!-- Stats Panel -->
        <div class="panel stats-panel">
          <div class="panel-title">THỐNG KÊ TRẬN</div>
          <div class="stat-row">
            <span class="stat-label">Tổng nước đi</span>
            <span class="stat-val" id="statMoves">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Thời gian</span>
            <span class="stat-val" id="statTime">00:00</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Chế độ</span>
            <span class="stat-val stat-val-green" id="statMode">Người vs AI</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Kích thước</span>
            <span class="stat-val">15×15</span>
          </div>
        </div>

        <!-- Legend Panel -->
        <div class="legend-panel">
          <div class="legend-col">
            <span id="legendXText" class="legend-name">Người chơi 1</span>
            <div class="legend-box player-box"></div>
          </div>
          <div class="legend-col">
            <span id="legendOText" class="legend-name">AI</span>
            <div class="legend-box ai-box"></div>
          </div>
        </div>

      </aside>
    </main>

  </div>

  <!-- Settings Modal (kept simple for this demo) -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Cài đặt</h2>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Tên người chơi X</label>
          <input type="text" id="inputPlayerX" class="setting-input" placeholder="Nhập tên..." maxlength="15" value="Người chơi 1" />
        </div>
        <div class="setting-group">
          <label>Tên người chơi O</label>
          <input type="text" id="inputPlayerO" class="setting-input" placeholder="Nhập tên..." maxlength="15" value="Người chơi 2" />
        </div>
        <div class="setting-group">
          <label>Chế độ chơi</label>
          <div class="mode-selector">
            <button class="mode-btn active" id="modeHumanAI" data-mode="human-ai">Người vs AI</button>
            <button class="mode-btn" id="modeHumanHuman" data-mode="human-human">Người vs Người</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveSettings">Lưu cài đặt</button>
      </div>
    </div>
  </div>

  <!-- Win Overlay (embedded to trigger via JS) -->
  <div class="win-overlay hidden" id="winOverlay">
    <div class="win-card">
      <div class="win-title" id="winTitle">WIN</div>
      <div class="win-sub" id="winSub">Người chơi đã thắng</div>
      <div class="win-buttons">
        <button class="btn btn-primary" id="btnWinNewGame">Chơi mới</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="game.js?v=5"></script>
</body>
</html>
